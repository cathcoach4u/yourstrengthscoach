<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Set new password &middot; Top 10 Strengths</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container container--narrow">
    <div class="card">
      <h1>Set a new password</h1>

      <form id="reset-form">
        <div class="form-group">
          <label for="password">New password</label>
          <input type="password" id="password" required minlength="8" autocomplete="new-password" />
        </div>
        <div id="msg" class="alert" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full">Update Password</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Supabase appends the recovery token as a hash fragment — the client picks it up automatically.
    document.getElementById('reset-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const msgEl    = document.getElementById('msg');

      const { error } = await supabase.auth.updateUser({ password });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Password updated! Redirecting to sign in…';
        setTimeout(() => window.location.href = 'login.html', 2000);
      }
    });
  </script>
</body>
</html>
