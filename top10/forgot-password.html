<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Forgot password &middot; Top 10 Strengths</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container container--narrow">
    <div class="card">
      <h1>Reset your password</h1>
      <p style="color:var(--c-muted);margin-top:0">We'll email you a link to set a new password.</p>

      <form id="forgot-form">
        <div class="form-group">
          <label for="email">Email address</label>
          <input type="email" id="email" required autocomplete="email" />
        </div>
        <div id="msg" class="alert" style="display:none"></div>
        <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
        <p style="text-align:center;margin-top:14px;font-size:0.875rem">
          <a href="login.html">Back to sign in</a>
        </p>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const SUPABASE_URL      = 'https://eekefsuaefgpqmjdyniy.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_pcXHwQVMpvEojb4K3afEMw_RMvgZM-Y';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    document.getElementById('forgot-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const msgEl = document.getElementById('msg');

      // IMPORTANT: full URL, not origin — Supabase redirect-allowlist matches the path.
      const redirectTo = window.location.href.replace('forgot-password.html', 'reset-password.html');

      const { error } = await supabase.auth.resetPasswordForEmail(email, { redirectTo });
      msgEl.style.display = 'block';
      if (error) {
        msgEl.className = 'alert alert-error';
        msgEl.textContent = error.message;
      } else {
        msgEl.className = 'alert alert-success';
        msgEl.textContent = 'Check your email for a reset link.';
      }
    });
  </script>
</body>
</html>
